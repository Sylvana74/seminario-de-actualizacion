<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8" />
    <title>Calculadora MVC y WebComponents</title>
    <style>
        .calculator-container {
            background-color: #f5f5f5;
            padding: 20px;
            border-radius: 8px;
            display: inline-block;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.1);
        }
        table {
            border-collapse: separate;
            border-spacing: 10px;
        }
        #display {
            width: 100%;
            box-sizing: border-box;
            height: 50px;
            text-align: right;
            font-size: 28px;
            padding: 5px 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            color: #333;
        }
        button {
            width: 60px;
            height: 50px;
            border: none;
            border-radius: 6px;
            color: white;
            font-family: Arial, sans-serif;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
        }
        .btn-blue   { background-color: #5584e4; box-shadow: 0px 5px #3a5fae; }
        .btn-green  { background-color: #7ed34d; box-shadow: 0px 5px #5a9c34; }
        .btn-orange { background-color: #ffaa29; box-shadow: 0px 5px #c5811d; }
        .btnDelete {
            color: white;
            font-family: arial;
            font-weight: bold;
            font-size: 70%;
            background-color: red;
            box-shadow: 0px 5px #BB3E22;
            width: 100%;
            height: 30px;
            border-radius: 6px;
            border-color: #BB3E22;
            cursor: pointer;
        }
    </style>
</head>
<body>
</body>
<script type="text/javascript">

    // ==========================================
    // 1. MODELO
    // ==========================================

    class CalculatorModel extends EventTarget
    {
        constructor()
        {
            super();
            this._expression = '';
        }

        setData(data)
        {
            this._expression += data;
            this.changed();
        }

        getData()
        {
            return this._expression;
        }

        calculate()
        {
            try
            {
                this._expression = eval(this._expression).toString();
            }
            catch (e)
            {
                this._expression = 'Error';
            }
            this.changed();
        }

        clear()
        {
            this._expression = '';
            this.changed();
        }

        changed()
        {
            this.dispatchEvent(new CustomEvent('changed'));
        }
    }

    // ==========================================
    // 2. VISTA
    // ==========================================

    class CalculatorView extends HTMLElement
    {
        constructor()
        {
            super();

            this.container           = document.createElement('div');
            this.container.className = 'calculator-container';
            this.table               = document.createElement('table');

            this.display          = document.createElement('input');
            this.display.id       = 'display';
            this.display.type     = 'text';
            this.display.readOnly = true;

            let trD     = document.createElement('tr');
            let tdD     = document.createElement('td');
            tdD.colSpan = 4;
            tdD.appendChild(this.display);
            trD.appendChild(tdD);
            this.table.appendChild(trD);

            this.btn7        = this.createBtn('7', 'btn-blue');
            this.btn8        = this.createBtn('8', 'btn-blue');
            this.btn9        = this.createBtn('9', 'btn-blue');
            this.btnPlus     = this.createBtn('+', 'btn-green');
            this.btn4        = this.createBtn('4', 'btn-blue');
            this.btn5        = this.createBtn('5', 'btn-blue');
            this.btn6        = this.createBtn('6', 'btn-blue');
            this.btnMinus    = this.createBtn('-', 'btn-green');
            this.btn3        = this.createBtn('3', 'btn-blue');
            this.btn2        = this.createBtn('2', 'btn-blue');
            this.btn1        = this.createBtn('1', 'btn-blue');
            this.btnMultiply = this.createBtn('*', 'btn-green');
            this.btn0        = this.createBtn('0', 'btn-blue');
            this.btnDot      = this.createBtn('.', 'btn-blue');
            this.btnResult   = this.createBtn('=', 'btn-orange');
            this.btnDivision = this.createBtn('/', 'btn-green');
            this.btnDelete   = this.createBtn('Borrar', 'btnDelete');

            this.btnDelete.style.width = '100%';

            this.addRow([this.btn7, this.btn8, this.btn9, this.btnPlus]);
            this.addRow([this.btn4, this.btn5, this.btn6, this.btnMinus]);
            this.addRow([this.btn3, this.btn2, this.btn1, this.btnMultiply]);
            this.addRow([this.btn0, this.btnDot, this.btnResult, this.btnDivision]);

            let trDel     = document.createElement('tr');
            let tdDel     = document.createElement('td');
            tdDel.colSpan = 4;
            tdDel.appendChild(this.btnDelete);
            trDel.appendChild(tdDel);
            this.table.appendChild(trDel);

            this.container.appendChild(this.table);
            this.appendChild(this.container);
        }

        createBtn(text, className)
        {
            let btn       = document.createElement('button');
            btn.innerText = text;
            btn.value     = text;
            btn.className = className;
            return btn;
        }

        addRow(buttons)
        {
            let tr = document.createElement('tr');
            for (let i = 0; i < buttons.length; i++)
            {
                let td = document.createElement('td');
                td.appendChild(buttons[i]);
                tr.appendChild(td);
            }
            this.table.appendChild(tr);
        }

        _despacharRequest(detail)
        {
            this.dispatchEvent(new CustomEvent('request', { detail: detail }));
        }

        update(data)
        {
            this.display.value = data;
        }

        connectedCallback()
        {
            console.log('CalculatorView agregada al DOM');

            this.btn0.addEventListener('click',        this._despacharRequest.bind(this, '0'));
            this.btn1.addEventListener('click',        this._despacharRequest.bind(this, '1'));
            this.btn2.addEventListener('click',        this._despacharRequest.bind(this, '2'));
            this.btn3.addEventListener('click',        this._despacharRequest.bind(this, '3'));
            this.btn4.addEventListener('click',        this._despacharRequest.bind(this, '4'));
            this.btn5.addEventListener('click',        this._despacharRequest.bind(this, '5'));
            this.btn6.addEventListener('click',        this._despacharRequest.bind(this, '6'));
            this.btn7.addEventListener('click',        this._despacharRequest.bind(this, '7'));
            this.btn8.addEventListener('click',        this._despacharRequest.bind(this, '8'));
            this.btn9.addEventListener('click',        this._despacharRequest.bind(this, '9'));
            this.btnDot.addEventListener('click',      this._despacharRequest.bind(this, '.'));
            this.btnPlus.addEventListener('click',     this._despacharRequest.bind(this, '+'));
            this.btnMinus.addEventListener('click',    this._despacharRequest.bind(this, '-'));
            this.btnMultiply.addEventListener('click', this._despacharRequest.bind(this, '*'));
            this.btnDivision.addEventListener('click', this._despacharRequest.bind(this, '/'));
            this.btnResult.addEventListener('click',   this._despacharRequest.bind(this, '='));
            this.btnDelete.addEventListener('click',   this._despacharRequest.bind(this, 'borrar'));
        }

        disconnectedCallback()
        {
            console.log('CalculatorView removida del DOM');

            this.btn0.removeEventListener('click',        this._despacharRequest.bind(this, '0'));
            this.btn1.removeEventListener('click',        this._despacharRequest.bind(this, '1'));
            this.btn2.removeEventListener('click',        this._despacharRequest.bind(this, '2'));
            this.btn3.removeEventListener('click',        this._despacharRequest.bind(this, '3'));
            this.btn4.removeEventListener('click',        this._despacharRequest.bind(this, '4'));
            this.btn5.removeEventListener('click',        this._despacharRequest.bind(this, '5'));
            this.btn6.removeEventListener('click',        this._despacharRequest.bind(this, '6'));
            this.btn7.removeEventListener('click',        this._despacharRequest.bind(this, '7'));
            this.btn8.removeEventListener('click',        this._despacharRequest.bind(this, '8'));
            this.btn9.removeEventListener('click',        this._despacharRequest.bind(this, '9'));
            this.btnDot.removeEventListener('click',      this._despacharRequest.bind(this, '.'));
            this.btnPlus.removeEventListener('click',     this._despacharRequest.bind(this, '+'));
            this.btnMinus.removeEventListener('click',    this._despacharRequest.bind(this, '-'));
            this.btnMultiply.removeEventListener('click', this._despacharRequest.bind(this, '*'));
            this.btnDivision.removeEventListener('click', this._despacharRequest.bind(this, '/'));
            this.btnResult.removeEventListener('click',   this._despacharRequest.bind(this, '='));
            this.btnDelete.removeEventListener('click',   this._despacharRequest.bind(this, 'borrar'));
        }
    }

    customElements.define('x-calculator', CalculatorView);

    // ==========================================
    // 3. CONTROLADOR
    // ==========================================

    class CalculatorController
    {
        constructor(view, model)
        {
            this.view  = view;
            this.model = model;
        }

        init()
        {
            this.model.addEventListener('changed', this.onModelChanged.bind(this));
            this.view.addEventListener('request',  this.onViewRequest.bind(this));
            this.view.update(this.model.getData());
        }

        release()
        {
            this.model.removeEventListener('changed', this.onModelChanged.bind(this));
            this.view.removeEventListener('request',  this.onViewRequest.bind(this));
        }

        onViewRequest(event)
        {
            if (event.detail === '=')
            {
                this.model.calculate();
            }
            else if (event.detail === 'borrar')
            {
                this.model.clear();
            }
            else
            {
                this.model.setData(event.detail);
            }
        }

        onModelChanged()
        {
            this.view.update(this.model.getData());
        }
    }

    // ==========================================
    // 4. MAIN
    // ==========================================

    function main()
    {
        let model      = new CalculatorModel();
        let view       = new CalculatorView();
        let controller = new CalculatorController(view, model);

        controller.init();

        document.body.appendChild(view);
    }

    window.onload = main;

</script>
</html>
