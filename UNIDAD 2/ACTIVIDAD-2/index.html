<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>W3Admin Dashboard - MVC WebComponent</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap">
    <link rel="stylesheet" href="./assets/icons/font-awesome-4.7.0/css/font-awesome.min.css">
    <link rel="stylesheet" href="./assets/css/w3pro-4.13.css">
    <link rel="stylesheet" href="./assets/css/w3-theme.css">
    <link rel="stylesheet" href="./assets/css/admin-styles.css">
    <link rel="stylesheet" href="./assets/css/scrollbar.css">
</head>
<body class="w3-light-grey">
</body>
<script>

    // ==========================================
    // 1. MODELO
    // ==========================================

    class WCApplicationModel extends EventTarget
    {
        constructor()
        {
            super();
            this._isSidebarOpen = false;
        }

        toggleSidebar()
        {
            this._isSidebarOpen = !this._isSidebarOpen;
            this.changed();
        }

        get isSidebarOpen()
        {
            return this._isSidebarOpen;
        }

        changed()
        {
            this.dispatchEvent(new CustomEvent('changed'));
        }
    }

    

    function createTopButton(iconClass)
    {
        // Construir elementos
        let button = document.createElement('button');
        let icon   = document.createElement('i');

        // Asignar clases y estilos
        button.type = 'button';
        button.classList.add('w3-button', 'w3-large', 'w3-opacity-min');
        icon.classList.add(...iconClass.split(' '));

        // Ensamblar
        button.appendChild(icon);

        return button;
    }

    function createUserButton()
    {
        // Construir elementos
        let container = document.createElement('div');
        let button    = document.createElement('div');
        let circle    = document.createElement('div');
        let icon      = document.createElement('i');

        // Asignar clases y estilos
        container.classList.add('text-right');
        button.classList.add('w3-button');
        circle.classList.add('w3-circle', 'w3-center', 'w3-text-white', 'w3-primary');
        circle.style.width   = '38px';
        circle.style.height  = '38px';
        icon.classList.add('fa', 'fa-fw', 'fa-user');
        icon.style.marginTop = '11px';

        // Ensamblar
        circle.appendChild(icon);
        button.appendChild(circle);
        container.appendChild(button);

        return container;
    }

    function createMenuButton(href, iconClass, text)
    {
        // Construir elementos
        let button = document.createElement('a');
        let icon   = document.createElement('i');

        // Asignar clases y estilos
        button.href = href;
        button.classList.add('w3-bar-item', 'w3-button', 'w3-padding-large', 'w3-hover-text-primary');
        icon.classList.add(...iconClass.split(' '));

        // Ensamblar
        button.appendChild(icon);
        button.appendChild(document.createTextNode('  ' + text));

        return button;
    }

    function createHeader()
    {
        // Construir elementos
        let header        = document.createElement('div');
        let bar           = document.createElement('div');
        let logoContainer = document.createElement('div');
        let logoTitle     = document.createElement('h5');
        let logoLink      = document.createElement('a');
        let logoImage     = document.createElement('img');
        let menuButton    = document.createElement('button');
        let menuIcon      = document.createElement('i');
        let rightButtons  = document.createElement('div');

        // Asignar clases y estilos
        header.classList.add('w3-top', 'w3-card');
        header.style.height = '54px';

        bar.classList.add('w3-flex-bar', 'w3-theme', 'w3-left-align');

        logoContainer.classList.add('admin-logo', 'w3-bar-item', 'w3-hide-medium', 'w3-hide-small');

        logoTitle.style.lineHeight = '1';
        logoTitle.style.margin     = '0';
        logoTitle.style.fontWeight = '300';

        logoLink.href = './index.html';
        logoLink.classList.add('w3-button', 'w3-bold');

        logoImage.src = './assets/admin-logo.png';
        logoImage.classList.add('w3-image');
        logoImage.width = 26;

        menuButton.classList.add('w3-button', 'w3-large', 'w3-opacity-min');
        menuIcon.classList.add('fa', 'fa-bars');

        rightButtons.classList.add('w3-right');

        // Ensamblar
        logoLink.appendChild(logoImage);
        logoLink.appendChild(document.createTextNode(' W3Admin'));
        logoTitle.appendChild(logoLink);
        logoContainer.appendChild(logoTitle);
        menuButton.appendChild(menuIcon);
        rightButtons.appendChild(createTopButton('fa fa-envelope-open'));
        rightButtons.appendChild(createTopButton('fa fa-bell'));

        bar.appendChild(logoContainer);
        bar.appendChild(menuButton);
        bar.appendChild(rightButtons);
        bar.appendChild(createUserButton());
        header.appendChild(bar);

        return header;
    }

    function createSidebar()
    {
        // Construir elementos
        let sidebar   = document.createElement('nav');
        let menu      = document.createElement('div');
        let titleMain = document.createElement('span');

        // Asignar clases y estilos
        sidebar.id = 'sidebar';
        sidebar.classList.add('w3-sidebar', 'w3-top', 'w3-bottom', 'w3-collapse',
                              'w3-white', 'w3-border-right', 'w3-border-top', 'scrollbar');
        sidebar.style.zIndex      = '3';
        sidebar.style.width       = '230px';
        sidebar.style.height      = 'auto';
        sidebar.style.marginTop   = '54px';
        sidebar.style.borderColor = 'rgba(0,0,0,.1)';

        menu.classList.add('w3-bar-block');

        titleMain.classList.add('w3-bar-item', 'w3-padding', 'w3-small', 'w3-opacity');
        titleMain.style.marginTop = '8px';
        titleMain.textContent     = 'MAIN NAVIGATION';

        // Ensamblar
        menu.appendChild(titleMain);
        menu.appendChild(createMenuButton('./index.html',    'fa fa-fw fa-bar-chart',  'Dashboard'));
        menu.appendChild(createMenuButton('./icons.html',    'fa fa-fw fa-fire',        'UI Icons'));
        menu.appendChild(createMenuButton('./forms.html',    'fa fa-fw fa-edit',        'Forms'));
        menu.appendChild(createMenuButton('./tables.html',   'fa fa-fw fa-table',       'Tables'));
        menu.appendChild(createMenuButton('./profile.html',  'fa fa-fw fa-user-circle', 'Profile'));
        menu.appendChild(createMenuButton('./login.html',    'fa fa-fw fa-lock',        'Login'));
        menu.appendChild(createMenuButton('./register.html', 'fa fa-fw fa-sign-in',     'Registration'));
        sidebar.appendChild(menu);

        return sidebar;
    }

    function createMain()
    {
        // Construir elementos
        let main    = document.createElement('div');
        let content = document.createElement('div');
        let title   = document.createElement('h2');

        // Asignar clases y estilos
        main.classList.add('w3-main');
        main.style.marginTop    = '54px';
        content.style.padding   = '16px 32px';
        content.style.minHeight = '80vh';
        title.innerText         = 'Panel de Control';

        // Ensamblar
        content.appendChild(title);
        main.appendChild(content);

        return main;
    }

    function createFooter()
    {
        // Construir elementos
        let footer     = document.createElement('footer');
        let textFooter = document.createElement('span');
        let heart      = document.createElement('span');

        // Asignar clases y estilos
        footer.classList.add('w3-padding', 'w3-border-top', 'w3-center', 'w3-white', 'w3-margin-top');
        textFooter.classList.add('w3-opacity');
        heart.classList.add('w3-text-red');
        heart.innerText = '♥';

        // Ensamblar
        textFooter.appendChild(document.createTextNode('Powered with '));
        textFooter.appendChild(heart);
        textFooter.appendChild(document.createTextNode(' by W3Mix.com'));
        footer.appendChild(textFooter);

        return footer;
    }

    // ==========================================
    // 2. VISTA
    // ==========================================

    class WCApplicationView extends HTMLElement
    {
        constructor()
        {
            super();

            this.app    = document.createElement('div');
            this.app.id = 'app';

            this.header  = createHeader();
            this.sidebar = createSidebar();
            this.main    = createMain();
            this.footer  = createFooter();

            this.main.appendChild(this.footer);

            this.app.appendChild(this.header);
            this.app.appendChild(this.sidebar);
            this.app.appendChild(this.main);
            this.appendChild(this.app);

            this.menuButton = this.header.querySelector('.fa-bars').parentElement;
        }

        _despacharRequest(detail)
        {
            this.dispatchEvent(new CustomEvent('request', { detail: detail }));
        }

        updateSidebarState(isOpen)
        {
            if (isOpen)
            {
                this.sidebar.style.display = 'block';
            }
            else
            {
                this.sidebar.style.display = 'none';
            }
        }

        connectedCallback()
        {
            console.log('WCApplicationView agregada al DOM');
            this.menuButton.addEventListener('click', this._despacharRequest.bind(this, 'toggleSidebar'));
        }

        disconnectedCallback()
        {
            console.log('WCApplicationView removida del DOM');
            this.menuButton.removeEventListener('click', this._despacharRequest.bind(this, 'toggleSidebar'));
        }
    }

    customElements.define('x-application-view', WCApplicationView);

    // ==========================================
    // 3. CONTROLADOR
    // ==========================================

    class WCApplicationController
    {
        constructor(view, model)
        {
            this.view  = view;
            this.model = model;
        }

        init()
        {
            this.model.addEventListener('changed', this.onModelChanged.bind(this));
            this.view.addEventListener('request',  this.onViewRequest.bind(this));
            this.view.updateSidebarState(this.model.isSidebarOpen);
        }

        release()
        {
            this.model.removeEventListener('changed', this.onModelChanged.bind(this));
            this.view.removeEventListener('request',  this.onViewRequest.bind(this));
        }

        onViewRequest(event)
        {
            if (event.detail === 'toggleSidebar')
            {
                this.model.toggleSidebar();
            }
        }

        onModelChanged()
        {
            this.view.updateSidebarState(this.model.isSidebarOpen);
        }
    }

    // ==========================================
    // 4. MAIN
    // ==========================================

    function main()
    {
        let model      = new WCApplicationModel();
        let view       = new WCApplicationView();
        let controller = new WCApplicationController(view, model);

        controller.init();

        document.body.appendChild(view);
    }

    window.onload = main;

</script>
</html>
