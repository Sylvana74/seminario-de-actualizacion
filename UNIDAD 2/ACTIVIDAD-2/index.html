<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>W3Admin Dashboard - MVC WebComponent</title>
    
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap">
    <link rel="stylesheet" href="./assets/icons/font-awesome-4.7.0/css/font-awesome.min.css">
    <link rel="stylesheet" href="./assets/css/w3pro-4.13.css">
    <link rel="stylesheet" href="./assets/css/w3-theme.css">
    <link rel="stylesheet" href="./assets/css/admin-styles.css">
    <link rel="stylesheet" href="./assets/css/scrollbar.css">
</head>

<body class="w3-light-grey">
    </body>

<script>
    // ==========================================
    // 1. MODELO (Estado de la barra lateral)
    // ==========================================
    class WCApplicationModel extends EventTarget {
        constructor() {
            super();
            this._isSidebarOpen = false;
        }

        toggleSidebar() {
            this._isSidebarOpen = !this._isSidebarOpen;
            this.changed();
        }

        get isSidebarOpen() {
            return this._isSidebarOpen;
        }

        changed() {
            this.dispatchEvent(new CustomEvent("change"));
        }
    }

    // ==========================================
    // 2. VISTA (El WebComponent)
    // ==========================================
    class WCApplicationView extends HTMLElement {
        constructor() {
            super();

            // Contenedor principal de la app
            this.app = document.createElement("div");
            this.app.id = "app";

            // Se construyen las partes de la interfaz
            this.header = this.createHeader();
            this.sidebar = this.createSidebar();
            this.main = this.createMain();
            this.footer = this.createFooter();

            // El footer va dentro del main
            this.main.appendChild(this.footer);

            // Se ensambla todo
            this.app.appendChild(this.header);
            this.app.appendChild(this.sidebar);
            this.app.appendChild(this.main);

            this.appendChild(this.app);
        }

        createHeader() {
            var header = document.createElement("div");
            header.className = "w3-top w3-card";
            header.style.height = "54px";

            var bar = document.createElement("div");
            bar.className = "w3-flex-bar w3-theme w3-left-align";

            var logoContainer = document.createElement("div");
            logoContainer.className = "admin-logo w3-bar-item w3-hide-medium w3-hide-small";
            
            var logoTitle = document.createElement("h5");
            logoTitle.style.lineHeight = "1";
            logoTitle.style.margin = "0";
            logoTitle.style.fontWeight = "300";

            var logoLink = document.createElement("a");
            logoLink.href = "./index.html";
            logoLink.className = "w3-button w3-bold";

            var logoImage = document.createElement("img");
            logoImage.src = "./assets/admin-logo.png";
            logoImage.className = "w3-image";
            logoImage.width = 26;

            logoLink.appendChild(logoImage);
            logoLink.append(" W3Admin");
            logoTitle.appendChild(logoLink);
            logoContainer.appendChild(logoTitle);

            // Botón del Menú (Hamburguesa)
            this.menuButton = document.createElement("button");
            this.menuButton.className = "w3-button w3-large w3-opacity-min";
            var menuIcon = document.createElement("i");
            menuIcon.className = "fa fa-bars";
            this.menuButton.appendChild(menuIcon);

            var rightButtons = document.createElement("div");
            rightButtons.className = "w3-right";
            rightButtons.appendChild(this.createTopButton("fa fa-envelope-open"));
            rightButtons.appendChild(this.createTopButton("fa fa-bell"));

            var userButton = this.createUserButton();

            bar.appendChild(logoContainer);
            bar.appendChild(this.menuButton);
            bar.appendChild(rightButtons);
            bar.appendChild(userButton);
            header.appendChild(bar);

            return header;
        }

        createSidebar() {
            var sidebar = document.createElement("nav");
            sidebar.id = "sidebar";
            sidebar.className = "w3-sidebar w3-top w3-bottom w3-collapse w3-white w3-border-right w3-border-top scrollbar";
            sidebar.style.zIndex = "3";
            sidebar.style.width = "230px";
            sidebar.style.height = "auto";
            sidebar.style.marginTop = "54px";
            sidebar.style.borderColor = "rgba(0,0,0,.1)";

            var menu = document.createElement("div");
            menu.className = "w3-bar-block";

            var titleMain = document.createElement("span");
            titleMain.className = "w3-bar-item w3-padding w3-small w3-opacity";
            titleMain.style.marginTop = "8px";
            titleMain.textContent = "MAIN NAVIGATION";

            menu.appendChild(titleMain);
            menu.appendChild(this.createMenuButton("./index.html", "fa fa-fw fa-bar-chart", "Dashboard"));
            menu.appendChild(this.createMenuButton("./icons.html", "fa fa-fw fa-fire", "UI Icons"));
            menu.appendChild(this.createMenuButton("./forms.html", "fa fa-fw fa-edit", "Forms"));
            menu.appendChild(this.createMenuButton("./tables.html", "fa fa-fw fa-table", "Tables"));
            menu.appendChild(this.createMenuButton("./profile.html", "fa fa-fw fa-user-circle", "Profile"));
            menu.appendChild(this.createMenuButton("./login.html", "fa fa-fw fa-lock", "Login"));
            menu.appendChild(this.createMenuButton("./register.html", "fa fa-fw fa-sign-in", "Registration"));

            sidebar.appendChild(menu);
            return sidebar;
        }

        createMenuButton(href, iconClass, text) {
            var button = document.createElement("a");
            button.href = href;
            button.className = "w3-bar-item w3-button w3-padding-large w3-hover-text-primary";

            var icon = document.createElement("i");
            icon.className = iconClass;

            button.appendChild(icon);
            button.append("  " + text);

            return button;
        }

        createTopButton(iconClass) {
            var button = document.createElement("button");
            button.type = "button";
            button.className = "w3-button w3-large w3-opacity-min";

            var icon = document.createElement("i");
            icon.className = iconClass;
            button.appendChild(icon);

            return button;
        }

        createUserButton() {
            var container = document.createElement("div");
            container.className = "text-right";

            var button = document.createElement("div");
            button.className = "w3-button";

            var circle = document.createElement("div");
            circle.className = "w3-circle w3-center w3-text-white w3-primary";
            circle.style.width = "38px";
            circle.style.height = "38px";

            var icon = document.createElement("i");
            icon.className = "fa fa-fw fa-user";
            icon.style.marginTop = "11px";

            circle.appendChild(icon);
            button.appendChild(circle);
            container.appendChild(button);

            return container;
        }

        createMain() {
            var main = document.createElement("div");
            main.className = "w3-main";
            main.style.marginTop = "54px";

            // Contenedor principal donde luego irán los gráficos
            this.content = document.createElement("div");
            this.content.style.padding = "16px 32px";
            this.content.style.minHeight = "80vh"; 
            
            var title = document.createElement("h2");
            title.innerText = "Panel de Control";
            this.content.appendChild(title);

            main.appendChild(this.content);
            return main;
        }

        createFooter() {
            var footer = document.createElement("footer");
            footer.className = "w3-padding w3-border-top w3-center w3-white w3-margin-top";

            var textFooter = document.createElement("span");
            textFooter.className = "w3-opacity";
            textFooter.innerHTML = 'Powered with <span class="w3-text-red">♥</span> by <strong>W3Mix.com</strong>.';

            footer.appendChild(textFooter);
            return footer;
        }

        // --- Traducción de evento visual a intención semántica ---
        onMenuClick() {
            this.dispatchEvent(new CustomEvent("menuToggle"));
        }

        // --- Actualización de interfaz ---
        updateSidebarState(isOpen) {
            if (isOpen) {
                this.sidebar.style.display = "block";
            } else {
                this.sidebar.style.display = "none";
            }
        }

        // --- Ciclos de vida obligatorios ---
        connectedCallback() {
            // SOLO asignaciones de eventos usando bind(this)
            this.menuButton.onclick = this.onMenuClick.bind(this);
        }

        disconnectedCallback() {
            // SOLO anulación de eventos
            this.menuButton.onclick = null;
        }
    }

    customElements.define("x-application-view", WCApplicationView);

    // ==========================================
    // 3. CONTROLADOR (El mediador)
    // ==========================================
    class WCApplicationController {
        constructor(view, model) {
            this.view = view;
            this.model = model;

            // Se guardan las funciones bindeables para poder removerlas en disable()
            this.onMenuToggleFunction = this.onViewMenuToggle.bind(this);
            this.onModelChangeFunction = this.onModelChange.bind(this);
        }

        enable() {
            this.view.addEventListener("menuToggle", this.onMenuToggleFunction);
            this.model.addEventListener("change", this.onModelChangeFunction);
        }

        disable() {
            this.view.removeEventListener("menuToggle", this.onMenuToggleFunction);
            this.model.removeEventListener("change", this.onModelChangeFunction);
        }

        onViewMenuToggle() {
            this.model.toggleSidebar();
        }

        onModelChange() {
            this.view.updateSidebarState(this.model.isSidebarOpen);
        }
    }

    // ==========================================
    // 4. MAIN (Inicialización de la aplicación)
    // ==========================================
    function main() {
        var model = new WCApplicationModel();
        var view = new WCApplicationView();
        var controller = new WCApplicationController(view, model);

        controller.enable();
        document.body.appendChild(view);
    }

    window.onload = main;

</script>

<script src="./assets/plugins/chartjs/Chart.min.js"></script>
<script src="./assets/plugins/chartjs/dashboard.js"></script>
</html>
