<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TP 1 - Ejercicio 2 (Validación de Fecha)</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f6f9;
        }
        .container {
            text-align: center;
            padding: 30px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            max-width: 400px;
        }
        .info-box {
            background-color: #e9ecef;
            padding: 10px;
            border-radius: 4px;
            font-size: 14px;
            color: #495057;
            margin: 15px 0;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background-color: #218838;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Ejercicio 2: Validador de Fecha de Nacimiento</h2>
        <p>El programa te pedirá tu fecha de nacimiento y contará los reintentos en caso de error.</p>
        
        <div class="info-box">
            <strong>Formato requerido:</strong> YYYY-MM-DD <br>
            (Ejemplo: 1995-05-12)
        </div>

        <button onclick="location.reload()">Iniciar Validación</button>
    </div>

    <script src="app.js"></script>
</body>
</html>
