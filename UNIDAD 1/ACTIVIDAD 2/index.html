<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8" />
    <title>Calculadora Web Component</title>
    <style>
        .calculator-container {
            background-color: #f5f5f5;
            padding: 20px;
            border-radius: 8px;
            display: inline-block;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.1);
        }

        table {
            border-collapse: separate;
            border-spacing: 10px;
        }

        #display {
            width: 100%;
            box-sizing: border-box;
            height: 50px;
            text-align: right;
            font-size: 28px;
            padding: 5px 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            color: #333;
        }

        button {
            width: 60px;
            height: 50px;
            border: none;
            border-radius: 6px;
            color: white;
            font-family: Arial, sans-serif;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
        }

        .btn-blue { background-color: #5584e4; box-shadow: 0px 5px #3a5fae; }
        .btn-green { background-color: #7ed34d; box-shadow: 0px 5px #5a9c34; }
        .btn-orange { background-color: #ffaa29; box-shadow: 0px 5px #c5811d; }

        .btnDelete {
            color: white;
            font-family: arial;
            font-weight: bold;
            font-size: 70%;
            background-color: red;
            box-shadow: 0px 5px #BB3E22;
            width: 100%;
            height: 30px;
            border-radius: 6px;
            border-color: #BB3E22;
            cursor: pointer;
        }
    </style>
</head>

<body>
    </body>

<script type="text/javascript">
    class CalculatorComponent extends HTMLElement {
        constructor() {
            super();

            this.container = document.createElement('div');
            this.container.className = 'calculator-container';
            this.table = document.createElement('table');
            
            this.display = document.createElement('input');
            this.display.id = 'display';
            this.display.type = 'text';
            this.display.disabled = true;

            const trD = document.createElement('tr');
            const tdD = document.createElement('td');
            tdD.colSpan = 4;
            tdD.appendChild(this.display);
            trD.appendChild(tdD);
            this.table.appendChild(trD);

            // Creación de botones
            this.btn0 = this.createBtn('0', 'btn-blue');
            this.btn1 = this.createBtn('1', 'btn-blue');
            this.btn2 = this.createBtn('2', 'btn-blue');
            this.btn3 = this.createBtn('3', 'btn-blue');
            this.btn4 = this.createBtn('4', 'btn-blue');
            this.btn5 = this.createBtn('5', 'btn-blue');
            this.btn6 = this.createBtn('6', 'btn-blue');
            this.btn7 = this.createBtn('7', 'btn-blue');
            this.btn8 = this.createBtn('8', 'btn-blue');
            this.btn9 = this.createBtn('9', 'btn-blue');
            this.btnDot = this.createBtn('.', 'btn-blue');
            this.btnPlus = this.createBtn('+', 'btn-green');
            this.btnMinus = this.createBtn('-', 'btn-green');
            this.btnMultiply = this.createBtn('*', 'btn-green');
            this.btnDivision = this.createBtn('/', 'btn-green');
            this.btnResult = this.createBtn('=', 'btn-orange');
            this.btnDelete = this.createBtn('Borrar', 'btnDelete');

            // Filas
            this.addRow([this.btn7, this.btn8, this.btn9, this.btnPlus]);
            this.addRow([this.btn4, this.btn5, this.btn6, this.btnMinus]);
            this.addRow([this.btn3, this.btn2, this.btn1, this.btnMultiply]);
            this.addRow([this.btn0, this.btnDot, this.btnResult, this.btnDivision]);
            
            const trDel = document.createElement('tr');
            const tdDel = document.createElement('td');
            tdDel.colSpan = 4;
            tdDel.appendChild(this.btnDelete);
            trDel.appendChild(tdDel);
            this.table.appendChild(trDel);

            this.container.appendChild(this.table);
            this.appendChild(this.container);
        }

        createBtn(text, className) {
            var btn = document.createElement('button');
            btn.innerText = text;
            btn.className = className;
            return btn;
        }

        addRow(buttons) {
            var tr = document.createElement('tr');
            for(var i = 0; i < buttons.length; i++) {
                var td = document.createElement('td');
                td.appendChild(buttons[i]);
                tr.appendChild(td);
            }
            this.table.appendChild(tr);
        }

        // Métodos de lógica
        onBtn0Click() { this.display.value += '0'; }
        onBtn1Click() { this.display.value += '1'; }
        onBtn2Click() { this.display.value += '2'; }
        onBtn3Click() { this.display.value += '3'; }
        onBtn4Click() { this.display.value += '4'; }
        onBtn5Click() { this.display.value += '5'; }
        onBtn6Click() { this.display.value += '6'; }
        onBtn7Click() { this.display.value += '7'; }
        onBtn8Click() { this.display.value += '8'; }
        onBtn9Click() { this.display.value += '9'; }
        onBtnDotClick() { this.display.value += '.'; }
        onBtnPlusClick() { this.display.value += '+'; }
        onBtnMinusClick() { this.display.value += '-'; }
        onBtnMultiplyClick() { this.display.value += '*'; }
        onBtnDivisionClick() { this.display.value += '/'; }
        onBtnResultClick() { this.display.value = eval(this.display.value); }
        onBtnDeleteClick() { this.display.value = ''; }

        connectedCallback() {
            this.btn0.onclick = this.onBtn0Click.bind(this);
            this.btn1.onclick = this.onBtn1Click.bind(this);
            this.btn2.onclick = this.onBtn2Click.bind(this);
            this.btn3.onclick = this.onBtn3Click.bind(this);
            this.btn4.onclick = this.onBtn4Click.bind(this);
            this.btn5.onclick = this.onBtn5Click.bind(this);
            this.btn6.onclick = this.onBtn6Click.bind(this);
            this.btn7.onclick = this.onBtn7Click.bind(this);
            this.btn8.onclick = this.onBtn8Click.bind(this);
            this.btn9.onclick = this.onBtn9Click.bind(this);
            this.btnDot.onclick = this.onBtnDotClick.bind(this);
            this.btnPlus.onclick = this.onBtnPlusClick.bind(this);
            this.btnMinus.onclick = this.onBtnMinusClick.bind(this);
            this.btnMultiply.onclick = this.onBtnMultiplyClick.bind(this);
            this.btnDivision.onclick = this.onBtnDivisionClick.bind(this);
            this.btnResult.onclick = this.onBtnResultClick.bind(this);
            this.btnDelete.onclick = this.onBtnDeleteClick.bind(this);
        }

        disconnectedCallback() {
            this.btn0.onclick = null;
            this.btn1.onclick = null;
            this.btn2.onclick = null;
            this.btn3.onclick = null;
            this.btn4.onclick = null;
            this.btn5.onclick = null;
            this.btn6.onclick = null;
            this.btn7.onclick = null;
            this.btn8.onclick = null;
            this.btn9.onclick = null;
            this.btnDot.onclick = null;
            this.btnPlus.onclick = null;
            this.btnMinus.onclick = null;
            this.btnMultiply.onclick = null;
            this.btnDivision.onclick = null;
            this.btnResult.onclick = null;
            this.btnDelete.onclick = null;
        }
    }

    customElements.define('x-calculator', CalculatorComponent);

    function main() {
        document.body.appendChild(new CalculatorComponent());
    }
    window.onload = main;
</script>

</html>
