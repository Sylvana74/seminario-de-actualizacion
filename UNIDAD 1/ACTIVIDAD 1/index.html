<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8" />
    <title>Calculadora</title>
    <style>
        .calculator-container {
            background-color: #f5f5f5;
            padding: 20px;
            border-radius: 8px;
            display: inline-block;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.1);
        }

        table {
            border-collapse: separate;
            border-spacing: 10px;
        }

        #display {
            width: 100%;
            box-sizing: border-box;
            height: 50px;
            text-align: right;
            font-size: 28px;
            padding: 5px 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            color: #333;
        }

        button {
            width: 60px;
            height: 50px;
            border: none;
            border-radius: 6px;
            color: white;
            font-family: Arial, sans-serif;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
        }

        .btn-blue { background-color: #5584e4; box-shadow: 0px 5px #3a5fae; }
        .btn-green { background-color: #7ed34d; box-shadow: 0px 5px #5a9c34; }
        .btn-orange { background-color: #ffaa29; box-shadow: 0px 5px #c5811d; }

        .btnDelete {
            color: white;
            font-family: arial;
            font-weight: bold;
            font-size: 70%;
            background-color: red;
            box-shadow: 0px 5px #BB3E22;
            width: 100%;
            height: 30px;
            border-radius: 6px;
            border-color: #BB3E22;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <div class="calculator-container">
        <table>
            <tr>
                <td colspan="4">
                    <input id="display" type="text" value="" disabled></input>
                </td>
            </tr>
            <tr>
                <td><button id="btn7" class="btn-blue">7</button></td>
                <td><button id="btn8" class="btn-blue">8</button></td>
                <td><button id="btn9" class="btn-blue">9</button></td>
                <td><button id="btnPlus" class="btn-green">+</button></td>
            </tr>
            <tr>
                <td><button id="btn4" class="btn-blue">4</button></td>
                <td><button id="btn5" class="btn-blue">5</button></td>
                <td><button id="btn6" class="btn-blue">6</button></td>
                <td><button id="btnMinus" class="btn-green">-</button></td>
            </tr>
            <tr>
                <td><button id="btn3" class="btn-blue">3</button></td>
                <td><button id="btn2" class="btn-blue">2</button></td>
                <td><button id="btn1" class="btn-blue">1</button></td>
                <td><button id="btnMultiply" class="btn-green">*</button></td>
            </tr>
            <tr>
                <td><button id="btn0" class="btn-blue">0</button></td>
                <td><button id="btnDot" class="btn-blue">.</button></td>
                <td><button id="btnResult" class="btn-orange">=</button></td>
                <td><button id="btnDivision" class="btn-green">/</button></td>
            </tr>
            <tr>
                <td colspan="4">
                    <button id="btnDelete" class="btnDelete">Borrar</button>
                </td>
            </tr>
        </table>
    </div>

    <script type="text/javascript">
        function onBtn0Click() { display.value += '0'; }
        function onBtn1Click() { display.value += '1'; }
        function onBtn2Click() { display.value += '2'; }
        function onBtn3Click() { display.value += '3'; }
        function onBtn4Click() { display.value += '4'; }
        function onBtn5Click() { display.value += '5'; }
        function onBtn6Click() { display.value += '6'; }
        function onBtn7Click() { display.value += '7'; }
        function onBtn8Click() { display.value += '8'; }
        function onBtn9Click() { display.value += '9'; }
        function onBtnDotClick() { display.value += '.'; }
        function onBtnPlusClick() { display.value += '+'; }
        function onBtnMinusClick() { display.value += '-'; }
        function onBtnMultiplyClick() { display.value += '*'; }
        function onBtnDivisionClick() { display.value += '/'; }
        
        function onBtnResultClick() {
            display.value = eval(display.value);
        }
        
        function onBtnDeleteClick() {
            display.value = '';
        }

        function main() {
            btn0.onclick = onBtn0Click;
            btn1.onclick = onBtn1Click;
            btn2.onclick = onBtn2Click;
            btn3.onclick = onBtn3Click;
            btn4.onclick = onBtn4Click;
            btn5.onclick = onBtn5Click;
            btn6.onclick = onBtn6Click;
            btn7.onclick = onBtn7Click;
            btn8.onclick = onBtn8Click;
            btn9.onclick = onBtn9Click;
            btnDot.onclick = onBtnDotClick;
            btnPlus.onclick = onBtnPlusClick;
            btnMinus.onclick = onBtnMinusClick;
            btnMultiply.onclick = onBtnMultiplyClick;
            btnDivision.onclick = onBtnDivisionClick;
            btnDelete.onclick = onBtnDeleteClick;
            btnResult.onclick = onBtnResultClick;
        }

        window.onload = main;
    </script>
</body>
</html>
